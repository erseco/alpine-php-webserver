# Temporary/on-demand: retag a multi-arch image without rebuilding.
# Usage: gh workflow run retag-floating.yml -f source_tag=3.23.4-1 -f target_tag=3.23
name: retag-floating

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: Existing image tag to copy from
        required: true
        type: string
      target_tag:
        description: Floating (or other) tag to point at source
        required: true
        type: string

jobs:
  retag:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag multi-arch index (Docker Hub + GHCR)
        env:
          SRC: ${{ inputs.source_tag }}
          DST: ${{ inputs.target_tag }}
          REPO: ${{ github.repository }}
        run: |
          set -eux
          # Do NOT touch latest/3.24 here — only the requested target_tag.
          docker buildx imagetools create \
            --tag "docker.io/${REPO}:${DST}" \
            "docker.io/${REPO}:${SRC}"
          docker buildx imagetools create \
            --tag "ghcr.io/${REPO}:${DST}" \
            "ghcr.io/${REPO}:${SRC}"
          echo "Retagged ${SRC} -> ${DST}"
          docker buildx imagetools inspect "docker.io/${REPO}:${DST}" | head -5
