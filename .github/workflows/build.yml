name: buildx

on:
  push:
    branches:
      - main # beta
    tags:
      # Match semantic version tags like 3.22, 3.22.1, 3.22.1-1, 3.22-beta, v3.22.1-rc1, etc.
      - '[0-9]+\.[0-9]+(\.[0-9]+)?(-[0-9A-Za-z]+)?' 
  pull_request:
  release:
    types: [ published ]

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Hadolint Action
        uses: hadolint/hadolint-action@v3.3.0
        with:
          format: sarif
          output-file: hadolint-results.sarif
          no-fail: true

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: hadolint-results.sarif
          category: hadolint-dockerfile

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install --yes shellcheck

      - name: Lint shell scripts
        run: |
          shellcheck \
            .github/scripts/update-readme.sh \
            run_tests.sh \
            rootfs/bin/docker-entrypoint.sh \
            rootfs/docker-entrypoint-init.d/*.sh

  test:
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image for ${{ matrix.platform }}
        run: |
          docker buildx build \
            --platform "${{ matrix.platform }}" \
            --tag alpine-php-webserver:test \
            --cache-from type=gha,scope=test-${{ matrix.platform }} \
            --cache-to type=gha,mode=max,scope=test-${{ matrix.platform }} \
            --load \
            .

      - name: Run container smoke tests on ${{ matrix.platform }}
        env:
          IMAGE_UNDER_TEST: alpine-php-webserver:test
        run: |
          docker compose version
          docker compose --file docker-compose.test.yml up -d app
          docker compose --file docker-compose.test.yml run --rm sut
          docker compose --file docker-compose.test.yml exec -T app curl --silent --fail http://127.0.0.1:8080/fpm-ping | grep -Fx 'pong'
          docker compose --file docker-compose.test.yml logs app | grep -F 'Finished startup scripts in /docker-entrypoint-init.d'

      - name: Show container logs on failure
        if: failure()
        run: docker compose --file docker-compose.test.yml logs

      - name: Tear down test stack
        if: always()
        run: docker compose --file docker-compose.test.yml down -v

  buildx:
    needs:
      - lint
      - test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # tags + full history

      - name: Check main ancestry
        id: mainline
        if: ${{ github.ref_type == 'tag' }}
        run: |
          git fetch origin main --depth=1
          if git merge-base --is-ancestor origin/main "$GITHUB_SHA"; then
            echo "is_main=true"  >> "$GITHUB_OUTPUT"
          else
            echo "is_main=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/${{ github.repository }}
            docker.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},enable=${{ github.ref_type == 'tag' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.ref_type == 'tag' }}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' && steps.mainline.outputs.is_main == 'true' }}
            type=raw,value=beta,enable=${{ github.ref_name == 'main' }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: all

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          platforms: linux/amd64,linux/arm/v6,linux/arm/v7,linux/arm64,linux/386,linux/ppc64le,linux/s390x
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        if: github.ref_type == 'tag' && steps.mainline.outputs.is_main == 'true'
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ github.repository }}@${{ steps.image.outputs.digest }}
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: Generate Supported Tags block
        if: github.ref_name == 'main' || (github.ref_type == 'tag' && steps.mainline.outputs.is_main == 'true')
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          MAINTAINED_MINORS: "3"
        run: |
          .github/scripts/update-readme.sh

      - name: Commit README if changed
        if: github.ref_name == 'main' || (github.ref_type == 'tag' && steps.mainline.outputs.is_main == 'true')
        run: |
          if ! git diff --quiet -- README.md; then
            git config user.name "github-actions"
            git config user.email "github-actions@users.noreply.github.com"
            git add README.md
            git commit -m "chore(readme): update supported tags"
            # release/tag runs can be in detached HEAD; push commit explicitly to main
            git push origin HEAD:main
          else
            echo "No README changes to commit."
          fi

      # Update Docker Hub Description
      - name: Docker Hub Description
        if: startsWith(github.ref, 'refs/tags/') && contains(join(steps.meta.outputs.tags, '\n'), 'latest')
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
          short-description: ${{ github.event.repository.description }}
          readme-filepath: ./README.md
